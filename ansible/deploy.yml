---
- name: Déploiement Shopping Cart avec Ansible
  hosts: webservers
  become: no
  connection: ssh

  vars:
    app_name: shopping-cart
    app_port: 8070
    docker_image: "mlamrini/shopping-cart:latest"

  tasks:
    - name: Afficher le début du déploiement
      debug:
        msg: "Déploiement de {{ app_name }} sur {{ inventory_hostname }}"

    - name: Installer et déployer
      raw: |
        apk add --no-cache docker -q
        /usr/bin/docker stop {{ app_name }} || true
        /usr/bin/docker rm {{ app_name }} || true
        /usr/bin/docker run -d --name {{ app_name }} -p {{ app_port }}:{{ app_port }} --restart always {{ docker_image }}

    - name: Vérifier le déploiement
      raw: /usr/bin/docker ps | grep {{ app_name }}

    - name: Afficher le résultat
      debug:
        msg: "Application déployée avec succès sur le port {{ app_port }} !"
